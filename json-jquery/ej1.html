<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EJ1 - Serialización</title>
    <!-- jQuery desde CDN: necesario para usar $ -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<h2>EJ1: Serialización y Deserialización</h2>

<!-- type="button" es CRÍTICO: sin esto el botón haría submit y recargaría la página -->
<button type="button" onclick="ejecutar()">Pulsa y observa la consola</button>

<!-- Elementos donde mostraremos el resultado -->
<p id="serializado"></p>
<p id="deserializado"></p>

<script>
    // Objeto JavaScript original (los datos de partida)
    let obj = {
        nombre:    "Álvaro",
        apellidos: "Vizuete Valle",
        edad:      18,
        ciudad:    "Sevilla"
    };

    // Convierte objeto JS → cadena de texto JSON
    // Necesario porque la red solo transmite texto
    function serializar(obj) {
        return JSON.stringify(obj);
        // Resultado: '{"nombre":"Álvaro","apellidos":"Vizuete Valle","edad":18,"ciudad":"Sevilla"}'
    }

    // Convierte cadena JSON → objeto JS
    // Necesario para acceder a .nombre, .edad, etc.
    function deserializar(objJson) {
        return JSON.parse(objJson);
    }

    function ejecutar() {
        // PASO 1: Serializar (empaquetar para "enviar")
        const json_serializado = serializar(obj);
        console.log(json_serializado);

        // .text() en lugar de .html() porque solo inserimos texto plano
        // .html() interpretaría etiquetas HTML dentro del string → peligroso (XSS)
        $("#serializado").text(json_serializado);

        // PASO 2: Deserializar (desempaquetar lo "recibido")
        const obj_recuperado = deserializar(json_serializado);
        console.log(obj_recuperado);

        // Construimos el texto con concatenación (sin format specifiers)
        let texto = "Nombre:" + obj_recuperado.nombre;
        texto += ", Apellidos:" + obj_recuperado.apellidos;
        texto += ", Edad:"      + obj_recuperado.edad;
        texto += ", Ciudad:"    + obj_recuperado.ciudad;

        console.log("Recuperado: " + texto);

        // .text() de jQuery inserta el string en el párrafo
        $("#deserializado").text("Recuperado: " + texto);
    }
</script>
</body>
</html>
