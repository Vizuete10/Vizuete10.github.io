<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EJ2 MEGARETO</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 6px; }
    tr:hover { background-color: #ffd0d0; cursor: pointer; }
    input { margin: 4px; }
  </style>
</head>
<body>
<h2>EJ2 MEGARETO: Array + generaTabla + splice</h2>

<input type="text"   id="nombre"    placeholder="Nombre">
<input type="text"   id="apellidos" placeholder="Apellidos">
<input type="number" id="edad"      placeholder="Edad">
<input type="text"   id="ciudad"    placeholder="Ciudad">
<button type="button" onclick="principal()">Insertar</button>

<div id="estadisticas"></div>

<table>
  <thead>
  <tr><th>Nombre</th><th>Apellidos</th><th>Edad</th><th>Ciudad</th></tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
  // "Base de datos local": empieza vacío al cargar la página
  let listaPersonas = [];
  let contadorId    = 0;

  function serializar(obj)  { return JSON.stringify(obj); }
  function deserializar(str){ return JSON.parse(str); }

  function principal() {
    // Validación compacta: si algún campo está vacío, para
    const campos = ["nombre", "apellidos", "edad", "ciudad"];
    for (const id of campos) {
      if ($("#" + id).val() === "") {
        alert("El campo " + id + " es obligatorio");
        return;
      }
    }

    contadorId++;
    const objJson = {
      id:        contadorId,
      nombre:    $("#nombre").val(),
      apellidos: $("#apellidos").val(),
      edad:      parseInt($("#edad").val()),
      ciudad:    $("#ciudad").val()
    };

    // (Opcional) Ciclo completo de serialización-deserialización
    const obj_recuperado = deserializar(serializar(objJson));

    // push() añade el objeto al final del array global
    listaPersonas.push(obj_recuperado);

    // Regeneramos la tabla completa desde el array
    // (así los índices siempre están actualizados)
    generaTabla(listaPersonas);

    mostrarEstadisticas();
    $("#nombre, #apellidos, #edad, #ciudad").val("");
  }

  // Vacía y reconstruye el tbody entero iterando el array
  function generaTabla(lista) {
    // html("") vacía el tbody antes de regenerar
    // Sin esto, cada llamada duplicaría las filas
    $("#tbody").html("");

    // forEach recorre el array: obj = elemento, indice = posición en el array
    // El índice es clave para saber qué splice() hacer al eliminar
    lista.forEach(function(obj, indice) {
      $("#tbody").append(generaTr(obj, indice));
    });
  }

  // Genera el HTML de un TR individual
  // Guardamos el índice del array en data-indice para usarlo en splice
  function generaTr(obj, indice) {
    return `<tr id="fila-${obj.id}" data-indice="${indice}" onclick="eliminarFila(this)">
                <td>${obj.nombre}</td>
                <td>${obj.apellidos}</td>
                <td>${obj.edad}</td>
                <td>${obj.ciudad}</td>
            </tr>`;
  }

  function eliminarFila(tr) {
    // Leemos el índice del array guardado en el atributo data-indice
    // parseInt porque .attr() devuelve un string
    const indice = parseInt($(tr).attr("data-indice"));

    // splice(índice, 1): elimina 1 elemento en esa posición del array
    // Esto es SEGURO porque regeneramos la tabla después (los índices se recalculan)
    listaPersonas.splice(indice, 1);

    // Regeneramos todo: los índices cambiaron tras el splice
    generaTabla(listaPersonas);
    mostrarEstadisticas();
  }

  function mostrarEstadisticas() {
    if (listaPersonas.length === 0) {
      $("#estadisticas").text("");
      return;
    }
    // .map(p => p.edad) extrae solo las edades del array de objetos
    const edades = listaPersonas.map(p => p.edad);
    const suma   = edades.reduce((acc, val) => acc + val, 0);
    const media  = suma / edades.length;
    const max    = Math.max(...edades);
    const min    = Math.min(...edades);

    $("#estadisticas").text(
            `Suma = ${suma}   Media = ${media.toFixed(1)}   Máximo = ${max}   Mínimo = ${min}`
    );
  }
</script>
</body>
</html>
