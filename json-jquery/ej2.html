<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EJ2 - Datos Dinámicos</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 6px; }
        input { margin: 4px; }
    </style>
</head>
<body>
<h2>Ejemplo 2: Datos dinámicos</h2>

<!-- Inputs simples, SIN <form action="..."> para que no recargue -->
<input type="text"   id="nombre"    placeholder="Nombre">
<input type="text"   id="apellidos" placeholder="Apellidos">
<input type="number" id="edad"      placeholder="Edad">
<input type="text"   id="ciudad"    placeholder="Ciudad">
<!-- type="button" evita el submit por defecto -->
<button type="button" onclick="principal()">Pulsa y observa la consola</button>

<table>
    <thead>
    <tr><th>Nombre</th><th>Apellidos</th><th>Edad</th><th>Ciudad</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    function serializar(obj)  { return JSON.stringify(obj); }
    function deserializar(str){ return JSON.parse(str); }

    function principal() {
        // .val() es jQuery para leer el valor de un <input>
        // Equivale a: document.getElementById("nombre").value
        let objJson = {
            nombre:    $("#nombre").val(),
            apellidos: $("#apellidos").val(),
            // parseInt convierte "22" (string) a 22 (number)
            // Si no lo hacemos, el JSON tendrá "edad":"22" en vez de "edad":22
            edad:      parseInt($("#edad").val()),
            ciudad:    $("#ciudad").val()
        };

        // Simulamos el viaje de red: serializar → "enviar" → deserializar → "recibir"
        const json_serializado  = serializar(objJson);
        console.log("Enviado:", json_serializado);

        const objeto_recuperado = deserializar(json_serializado);
        console.log("Recibido:", objeto_recuperado);

        // generaTr devuelve un string HTML → append() lo inserta en el tbody
        // Usamos append() y no html() para no borrar filas anteriores
        $("#tbody").append(generaTr(objeto_recuperado));
    }

    // Devuelve el HTML de una fila completa a partir del objeto
    function generaTr(obj) {
        // Template literal: más limpio que "..." + obj.nombre + "..."
        return `<tr>
                <td>${obj.nombre}</td>
                <td>${obj.apellidos}</td>
                <td>${obj.edad}</td>
                <td>${obj.ciudad}</td>
            </tr>`;
    }
</script>
</body>
</html>
