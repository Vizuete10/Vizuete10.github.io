<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EJ2 RETO</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 6px; }
        tr:hover { background-color: #ffd0d0; cursor: pointer; }
        input { margin: 4px; }
        #estadisticas { margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
<h2>EJ2 RETO: Validación, eliminar y estadísticas</h2>

<input type="text"   id="nombre"    placeholder="Nombre">
<input type="text"   id="apellidos" placeholder="Apellidos">
<input type="number" id="edad"      placeholder="Edad">
<input type="text"   id="ciudad"    placeholder="Ciudad">
<button type="button" onclick="principal()">Insertar</button>

<div id="estadisticas"></div>

<table>
    <thead>
    <tr>
        <th>Nombre</th><th>Apellidos</th><th>Edad</th><th>Ciudad</th>
    </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    let contadorId = 0; // Genera IDs únicos para cada fila
    let edades = [];    // Array de edades para calcular estadísticas

    function serializar(obj)  { return JSON.stringify(obj); }
    function deserializar(str){ return JSON.parse(str); }

    function principal() {
        // --- VALIDACIÓN campo a campo ---
        // Comprobamos si el valor está vacío ("")
        // Si está vacío, mostramos alerta y SALIMOS con return
        if ($("#nombre").val() === "") {
            alert("El campo Nombre es obligatorio");
            return; // Para la función aquí, no continúa
        }
        if ($("#apellidos").val() === "") {
            alert("El campo Apellidos es obligatorio");
            return;
        }
        if ($("#edad").val() === "") {
            alert("El campo Edad es obligatorio");
            return;
        }
        if ($("#ciudad").val() === "") {
            alert("El campo Ciudad es obligatorio");
            return;
        }

        contadorId++; // Nuevo ID único para esta fila

        let objJson = {
            id:        contadorId,
            nombre:    $("#nombre").val(),
            apellidos: $("#apellidos").val(),
            edad:      parseInt($("#edad").val()),
            ciudad:    $("#ciudad").val()
        };

        const obj_recuperado = deserializar(serializar(objJson));

        // Guardamos la edad en el array para calcular estadísticas
        edades.push(obj_recuperado.edad);

        // append() para añadir sin borrar las filas anteriores
        $("#tbody").append(generaTr(obj_recuperado));

        mostrarEstadisticas();

        // Limpiamos los campos tras insertar
        // El selector múltiple con coma aplica val("") a todos a la vez
        $("#nombre, #apellidos, #edad, #ciudad").val("");
    }

    // El TR tiene un id único y un onclick para eliminarse a sí mismo
    // 'this' referencia al TR que se ha pulsado
    function generaTr(obj) {
        return `<tr id="fila-${obj.id}" onclick="eliminarFila(this, ${obj.edad})">
                <td>${obj.nombre}</td>
                <td>${obj.apellidos}</td>
                <td>${obj.edad}</td>
                <td>${obj.ciudad}</td>
            </tr>`;
    }

    function eliminarFila(tr, edad) {
        // .remove() elimina el elemento del DOM completamente
        // $(tr) convierte el elemento nativo en objeto jQuery para usar .remove()
        $(tr).remove();

        // Buscamos y eliminamos la edad del array
        // indexOf devuelve la primera posición donde aparece ese valor
        const pos = edades.indexOf(edad);
        if (pos !== -1) {
            // splice(posición, cantidad): elimina 1 elemento en esa posición
            edades.splice(pos, 1);
        }

        mostrarEstadisticas(); // Recalculamos con los datos restantes
    }

    function mostrarEstadisticas() {
        if (edades.length === 0) {
            $("#estadisticas").text("");
            return;
        }
        // reduce acumula: empieza en 0, suma cada valor (acc + val)
        const suma  = edades.reduce((acc, val) => acc + val, 0);
        const media = suma / edades.length;
        // Math.max/min con spread (...) desempaqueta el array como argumentos
        const max   = Math.max(...edades);
        const min   = Math.min(...edades);

        $("#estadisticas").text(
            `Suma = ${suma}   Media = ${media.toFixed(1)}   Máximo = ${max}   Mínimo = ${min}`
        );
    }
</script>
</body>
</html>
