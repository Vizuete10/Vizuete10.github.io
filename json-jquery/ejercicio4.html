<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EJ4 - RETO y MEGARETO</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 6px; }
        fieldset { margin: 8px 0; }
        tr:hover { background-color: #ffd0d0; cursor: pointer; }
        #mensajeError { font-weight: bold; }
    </style>
</head>
<body>
<h2>EJ4 RETO: Tabla de Productos con reto4.php</h2>

<!-- Campos que necesita la BD: descripcion, idProveedor, precio (no el id, es AUTO_INCREMENT) -->
<input type="text"   id="descripcion"  placeholder="Descripción">
<input type="number" id="idProveedor"  placeholder="ID Proveedor">
<input type="number" id="precio"       placeholder="Precio" step="0.01">
<button type="button" onclick="enviarProducto()">Insertar Producto</button>

<!-- El error se muestra aquí en rojo; en verde si se elimina correctamente (MEGARETO) -->
<h2 id="mensajeError"></h2>

<table>
    <thead>
    <tr><th>ID</th><th>Descripción</th><th>ID Proveedor</th><th>Precio</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    // ─── EJ4 BASE: eco.php ─────────────────────────────────────────────
    // Este bloque sería para ej4.html (eco.php devuelve el array + cálculos)
    // Aquí lo sustituimos por reto4.php para el RETO
    // ───────────────────────────────────────────────────────────────────

    function enviarProducto() {
        // Validación
        if (!$("#descripcion").val() || !$("#idProveedor").val() || !$("#precio").val()) {
            alert("Todos los campos son obligatorios");
            return;
        }

        // Objeto con los campos que espera la tabla tProductos
        // NO incluimos 'id' porque es AUTO_INCREMENT (lo genera la BD)
        const producto = {
            descripcion: $("#descripcion").val(),
            idProveedor: parseInt($("#idProveedor").val()),
            precio:      parseFloat($("#precio").val())
        };

        // ─── ENVÍO CON $.ajax() ──────────────────────────────────────────
        $.ajax({
            url:         "https://lm.iesnervion.es/reto4.php",
            method:      "POST",
            // data: lo que enviamos al servidor, serializado
            data:        JSON.stringify(producto),
            // contentType: le avisamos al servidor de que enviamos JSON
            contentType: "application/json",
            // dataType: jQuery parseará la respuesta como JSON automáticamente
            dataType:    "json"
        })
            .done(function(respuesta) {
                // respuesta ya es un objeto JS (jQuery lo parseó por dataType:"json")
                console.log("Respuesta:", respuesta);

                // El servidor devuelve { lista: [...], error: null o "mensaje" }
                // Si error es null → todo OK; si no → hay un error
                if (respuesta.error === null) {
                    // Sin error: limpiamos el mensaje de error
                    $("#mensajeError").css("color", "red").text("");
                } else {
                    // Con error: mostramos en rojo y negrita (ya tiene font-weight en CSS)
                    $("#mensajeError").css("color", "red").text(respuesta.error);
                }

                // Mostramos la lista devuelta por el servidor en la tabla
                if (respuesta.lista) {
                    generaTabla(respuesta.lista);
                }
            })
            .fail(function(xhr, status, error) {
                // Si la petición HTTP falla (red, 404, 500...)
                console.error("Error HTTP:", xhr.status, error);
                $("#mensajeError").css("color", "red")
                    .text("Error de conexión: " + xhr.status + " - " + error);
            });

        // Limpiamos campos (no esperamos a la respuesta)
        $("#descripcion, #idProveedor, #precio").val("");
    }

    function generaTabla(lista) {
        $("#tbody").html(""); // Vaciamos antes de regenerar
        lista.forEach(function(producto) {
            // MEGARETO: el id viene del servidor (AUTO_INCREMENT de la BD)
            // Lo usamos como id del TR para poder enviarlo al hacer DELETE
            const fila = `<tr id="fila-${producto.id}"
                    onclick="eliminarProducto(${producto.id}, this)">
                    <td>${producto.id}</td>
                    <td>${producto.descripcion}</td>
                    <td>${producto.idProveedor}</td>
                    <td>${parseFloat(producto.precio).toFixed(2)}</td>
                </tr>`;
            $("#tbody").append(fila);
        });
    }

    // ─── EJ4 MEGARETO: DELETE ────────────────────────────────────────
    function eliminarProducto(id, tr) {
        $.ajax({
            // El id va en la URL como parámetro GET: ?id=5
            url:    "https://lm.iesnervion.es/reto4.php?id=" + id,
            // Cambiamos POST por DELETE (el servidor lo distingue)
            method: "DELETE",
            dataType: "json"
        })
            .done(function(respuesta) {
                console.log("Eliminado:", respuesta);
                if (!respuesta.error) {
                    // Eliminamos visualmente el TR del DOM sin recargar la tabla
                    $(tr).remove();
                    // Mensaje de éxito en verde dentro del h2
                    $("#mensajeError").css("color", "green")
                        .text("Se ha eliminado correctamente");
                } else {
                    $("#mensajeError").css("color", "red").text(respuesta.error);
                }
            })
            .fail(function(xhr, status, error) {
                $("#mensajeError").css("color", "red")
                    .text("Error al eliminar: " + xhr.status);
            });
    }

    // ─── Alternativa para eco.php (EJ4 BASE) ────────────────────────

    //         "Suma=" + respuesta.suma + " Media=" + respuesta.media + ...
    //     );
    // }).fail(...);
    // ────────────────────────────────────────────────────────────────
</script>
</body>
</html>
