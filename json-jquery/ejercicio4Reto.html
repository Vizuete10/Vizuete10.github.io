<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4: RETO Final (con jQuery/AJAX)</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<h1>Insertar Producto con AJAX (RETO 4)</h1>

<h2 id="mensajeError" class="error-texto"></h2>

<div class="formulario">
    <label>Descripción:</label>
    <input type="text" id="descripcion"><br><br>

    <label>ID Proveedor:</label>
    <input type="number" id="idProveedor"><br><br>

    <label>Precio:</label>
    <input type="number" step="0.01" id="precio"><br><br>

    <button id="enviarBtn">Enviar a Base de Datos</button>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>ID Proveedor</th>
        <th>Precio</th>
    </tr>
    </thead>
    <tbody id="cuerpoTabla">
    <!-- Las filas aparecerán aquí -->
    </tbody>
</table>

<script>
    $("#enviarBtn").click(function() {

        // Recogemos los datos usando .val()
        let descVal = $("#descripcion").val();
        let idProvVal = $("#idProveedor").val();
        let precioVal = $("#precio").val();

        // Creamos el objeto JavaScript
        let nuevoProducto = {
            descripcion: descVal,
            idProveedor: Number(idProvVal),
            precio: Number(precioVal)
        };

        // Petición AJAX con jQuery
        $.ajax({
            url: "https://lm.iesnervion.es/reto4.php",
            method: "POST", // Vamos a enviar datos
            data: JSON.stringify(nuevoProducto), // Serializamos a JSON
            contentType: "application/json", // Decimos que enviamos JSON
            dataType: "json", // Esperamos recibir JSON

            // Si la petición va bien
            success: function(datosRecibidos) {
                console.log("Respuesta del servidor:", datosRecibidos);

                // Gestión del Error en el h2
                if (datosRecibidos.error) {
                    // Con .text() cambiamos el texto y con .css() los estilos
                    $("#mensajeError").text("ERROR: " + datosRecibidos.error).css("color", "red");
                } else {
                    $("#mensajeError").text("¡Producto insertado correctamente!").css("color", "green");
                }

                // Generar la Tabla
                let $tbody = $("#cuerpoTabla");
                $tbody.empty(); // Vaciamos la tabla antigua (equivale a innerHTML = "")

                // Recorremos la lista usando el $.each de jQuery
                $.each(datosRecibidos.lista, function(index, producto) {
                    let filaHTML = "<tr>" +
                        "<td>" + producto.id + "</td>" +
                        "<td>" + producto.descripcion + "</td>" +
                        "<td>" + producto.idProveedor + "</td>" +
                        "<td>" + producto.precio + "</td>" +
                        "</tr>";

                    // Añadimos la fila al final del tbody con .append()
                    $tbody.append(filaHTML);
                });
            },

            // Si el servidor falla o no hay internet
            error: function(xhr, status, error) {
                console.error("Error de conexión:", error);
                $("#mensajeError").text("Fallo al comunicar con el servidor.").css("color", "red");
            }
        });
    });
</script>
</body>
</html>
