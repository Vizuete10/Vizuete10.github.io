<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Repaso 1</title>
</head>
<body>

<p id="resultado"></p>

<script>
    // fase 1
    let datosPersona = {
        nombre: "Alvaro",
        edad: 19,
        ciudad: "Sevilla",
    }

    // fase 2: Serializar
    function empaquetarJSON(datosPersona){
        return JSON.stringify(datosPersona);
    }

    // CORRECCIÓN 1: Añadida la "n" a "Convertidos"
    let datosConvertidosJSON = empaquetarJSON(datosPersona);
    console.log("Datos empaquetados: " + datosConvertidosJSON);

    // fase 3: Deserializar
    function desempaquetarJSON(datosConvertidosJSON) {
        // Convierte el texto JSON de vuelta a objeto
        return JSON.parse(datosConvertidosJSON);
    }

    let datosRecuperados = desempaquetarJSON(datosConvertidosJSON);

    console.log("Objeto JS recuperado: ", datosRecuperados);

    console.log("Hola " + datosRecuperados.nombre + ", sé que tienes " + datosRecuperados.edad + " años.");

    // Ponerlo en HTML

    // Crear la variable parrafo y asignarla a un id del html
    let parrafo = document.getElementById("resultado");

    // Añadir contenido a esa variable
    parrafo.textContent = "Recuperado: Nombre: " + datosRecuperados.nombre + ", Apellidos: " + datosRecuperados.apellidos + ", Edad: " + datosRecuperados.edad;
</script>
</body>
</html>
