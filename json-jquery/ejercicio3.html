<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EJ3 - Hobbies</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 6px; }
        fieldset { margin: 10px 0; padding: 8px; }
        tr:hover { background-color: #ffd0d0; cursor: pointer; }
        input[type="text"], input[type="number"] { margin: 4px; }
    </style>
</head>
<body>
<h2>EJ3: Listas (Hobbies)</h2>

<input type="text"   id="nombre"    placeholder="Nombre">
<input type="text"   id="apellidos" placeholder="Apellidos">
<input type="number" id="edad"      placeholder="Edad">
<input type="text"   id="ciudad"    placeholder="Ciudad">

<!-- fieldset agrupa visualmente los checkboxes -->
<!-- Todos tienen name="hobbies[]" para poder seleccionarlos juntos con jQuery -->
<fieldset>
    <legend>Hobbies</legend>
    <label><input type="checkbox" name="hobbies[]" value="Deporte">       Deporte</label>
    <label><input type="checkbox" name="hobbies[]" value="Lectura">       Lectura</label>
    <label><input type="checkbox" name="hobbies[]" value="Música">        Música</label>
    <label><input type="checkbox" name="hobbies[]" value="Juegos">        Juegos</label>
    <label><input type="checkbox" name="hobbies[]" value="Cine">          Cine</label>
    <label><input type="checkbox" name="hobbies[]" value="Teatro">        Teatro</label>
    <label><input type="checkbox" name="hobbies[]" value="Coleccionismo"> Coleccionismo</label>
    <label><input type="checkbox" name="hobbies[]" value="Bricolaje">     Bricolaje</label>
    <label><input type="checkbox" name="hobbies[]" value="Cosplay">       Cosplay</label>
</fieldset>

<button type="button" onclick="principal()">Pulsa para insertar</button>

<table>
    <thead>
    <tr>
        <th>Nombre</th><th>Apellidos</th><th>Edad</th>
        <th>Ciudad</th><th>Hobbies</th>
    </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    let listaPersonas = [];
    let contadorId    = 0;

    // ============================================================
    // EJ3 RETO: Limitar a máximo 3 checkboxes
    // Este bloque se ejecuta al cargar la página y "escucha" cambios
    // ============================================================
    $('input:checkbox').on('change', function() {
        // .filter(':checked') selecciona solo los marcados
        // .length cuenta cuántos hay
        const marcados = $('input:checkbox').filter(':checked').length;

        if (marcados >= 3) {
            // Si ya hay 3 marcados, deshabilita los que NO están marcados
            // .not(':checked') selecciona los desmarcados
            // .prop('disabled', true) los bloquea → el usuario no puede marcarlos
            $('input:checkbox').not(':checked').prop('disabled', true);
        } else {
            // Si hay menos de 3, habilita todos de nuevo (por si alguien desmarcó)
            $('input:checkbox').prop('disabled', false);
        }
    });
    // ============================================================

    function serializar(obj)  { return JSON.stringify(obj); }
    function deserializar(str){ return JSON.parse(str); }

    function principal() {
        if (!$("#nombre").val() || !$("#apellidos").val() ||
            !$("#edad").val()   || !$("#ciudad").val()) {
            alert("Todos los campos son obligatorios");
            return;
        }

        // --- LECTURA DE CHECKBOXES MARCADOS ---
        // $('input[name="hobbies[]"]') → todos los checkboxes con ese name
        // .filter(':checked')          → solo los que están marcados
        // .map(function(){ return $(this).val(); }) → extrae el value de cada uno
        // .get()                       → convierte el objeto jQuery en Array JS nativo
        const hobbies = $('input[name="hobbies[]"]')
            .filter(':checked')
            .map(function() { return $(this).val(); })
            .get();

        contadorId++;
        const objJson = {
            id:        contadorId,
            nombre:    $("#nombre").val(),
            apellidos: $("#apellidos").val(),
            edad:      parseInt($("#edad").val()),
            ciudad:    $("#ciudad").val(),
            hobbies:   hobbies  // Array de strings: ["Deporte", "Cine"]
        };

        const obj_recuperado = deserializar(serializar(objJson));
        listaPersonas.push(obj_recuperado);
        generaTabla(listaPersonas);

        // Limpiar campos y desmarcar checkboxes
        $("#nombre, #apellidos, #edad, #ciudad").val("");
        // .prop('checked', false) desmarca todos los checkboxes
        // .prop('disabled', false) los rehabilita (por si estaban bloqueados)
        $('input[name="hobbies[]"]').prop('checked', false).prop('disabled', false);
    }

    function generaTabla(lista) {
        $("#tbody").html("");
        lista.forEach(function(obj, indice) {
            $("#tbody").append(generaTr(obj, indice));
        });
    }

    function generaTr(obj, indice) {
        // .join('<br>') une el array de hobbies con saltos de línea HTML
        // Si no hay hobbies, muestra "—"
        const hobbiesHtml = obj.hobbies.length > 0
            ? obj.hobbies.join('<br>')
            : '—';

        return `<tr id="fila-${obj.id}" data-indice="${indice}" onclick="eliminarFila(this)">
                <td>${obj.nombre}</td>
                <td>${obj.apellidos}</td>
                <td>${obj.edad}</td>
                <td>${obj.ciudad}</td>
                <td>${hobbiesHtml}</td>
            </tr>`;
    }

    function eliminarFila(tr) {
        const indice = parseInt($(tr).attr("data-indice"));
        listaPersonas.splice(indice, 1);
        generaTabla(listaPersonas);
    }
</script>
</body>
</html>
