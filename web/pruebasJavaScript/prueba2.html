<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Ahorcado</title>
    <style>
        /* в”Ђв”Ђ Estilos generales в”Ђв”Ђ */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.3em;
            color: #a78bfa;
            margin-bottom: 0.5rem;
        }

        /* в”Ђв”Ђ Contenedor principal: dos columnas в”Ђв”Ђ */
        .juego {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
            width: 100%;
            max-width: 750px;
        }

        /* в”Ђв”Ђ Panel izquierdo: dibujo del ahorcado в”Ђв”Ђ */
        .panel-izq {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* El dibujo del ahorcado usa texto PRE (arte ASCII) */
        #dibujo {
            background: #16213e;
            border: 1px solid #2e2e6e;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            line-height: 1.4;
            white-space: pre;        /* Respeta los espacios y saltos de lГ­nea */
            color: #e0e0e0;
            width: 100%;
            text-align: center;
        }

        /* Caja de intentos restantes */
        #intentos {
            background: #16213e;
            border: 1px solid #2e2e6e;
            border-radius: 8px;
            padding: 0.7rem 1.2rem;
            text-align: center;
            width: 100%;
        }
        #intentos span {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f87171;
        }

        /* в”Ђв”Ђ Panel derecho: palabra, teclado, mensajes в”Ђв”Ђ */
        .panel-der {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* CategorГ­a */
        #categoria {
            font-size: 0.85rem;
            color: #a78bfa;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Palabra con guiones */
        #palabra {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Cada letra de la palabra es un span */
        #palabra span {
            display: inline-block;
            width: 28px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            border-bottom: 3px solid #6d6d9e;
            color: #fff;
            padding-bottom: 2px;
            letter-spacing: 0;
        }

        /* в”Ђв”Ђ Teclado visual в”Ђв”Ђ */
        #teclado {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 380px;
        }

        #teclado button {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            border: 1px solid #4a4a7a;
            background: #16213e;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        #teclado button:hover:not(:disabled) {
            background: #2e2e6e;
            transform: scale(1.1);
        }

        /* Letra acertada в†’ verde */
        #teclado button.acierto {
            background: #166534;
            border-color: #4ade80;
            color: #4ade80;
        }

        /* Letra fallada в†’ rojo */
        #teclado button.fallo {
            background: #7f1d1d;
            border-color: #f87171;
            color: #f87171;
        }

        /* Botones deshabilitados no permiten clic */
        #teclado button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* в”Ђв”Ђ Mensaje de victoria o derrota в”Ђв”Ђ */
        #mensaje {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            display: none; /* Oculto por defecto */
        }
        #mensaje.victoria {
            background: #14532d;
            color: #4ade80;
            border: 1px solid #4ade80;
            display: block;
        }
        #mensaje.derrota {
            background: #7f1d1d;
            color: #f87171;
            border: 1px solid #f87171;
            display: block;
        }

        /* в”Ђв”Ђ BotГіn reiniciar в”Ђв”Ђ */
        #btnReiniciar {
            display: none; /* Oculto hasta que termine la partida */
            padding: 0.7rem 1.8rem;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: background 0.2s;
        }
        #btnReiniciar:hover { background: #5b21b6; }

        /* в”Ђв”Ђ EstadГ­sticas в”Ђв”Ђ */
        #stats {
            margin-top: 2rem;
            background: #16213e;
            border: 1px solid #2e2e6e;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            width: 100%;
            max-width: 750px;
            font-size: 0.9rem;
            color: #a0a0c0;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        #stats span { color: #a78bfa; font-weight: bold; }
    </style>
</head>
<body>

<h1>EL AHORCADO</h1>

<div class="juego">

    <!-- Panel izquierdo -->
    <div class="panel-izq">
        <pre id="dibujo"></pre>
        <div id="intentos">Intentos: <span id="numIntentos">6</span> / 6</div>
    </div>

    <!-- Panel derecho -->
    <div class="panel-der">
        <div id="categoria">CategorГ­a: <strong id="textCategoria"></strong></div>
        <div id="palabra"></div>
        <div id="teclado"></div>
        <div id="mensaje"></div>
        <button id="btnReiniciar" onclick="iniciarJuego()">Nueva partida</button>
    </div>

</div>

<!-- EstadГ­sticas globales -->
<div id="stats">
    Partidas jugadas: <span id="statJugadas">0</span>
    &nbsp;|&nbsp; Ganadas: <span id="statGanadas">0</span>
    &nbsp;|&nbsp; % Aciertos: <span id="statPct">0%</span>
</div>


<script>

    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 1. DATOS: array de palabras con categorГ­as
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Cada elemento es un objeto con dos propiedades:
    //   - palabra:    la palabra en MAYГљSCULAS
    //   - categoria:  a quГ© grupo pertenece

    const palabras = [
        { palabra: "ELEFANTE",     categoria: "Animales" },
        { palabra: "COCODRILO",    categoria: "Animales" },
        { palabra: "MARIPOSA",     categoria: "Animales" },
        { palabra: "TIBURON",      categoria: "Animales" },
        { palabra: "JAVASCRIPT",   categoria: "TecnologГ­a" },
        { palabra: "NAVEGADOR",    categoria: "TecnologГ­a" },
        { palabra: "TECLADO",      categoria: "TecnologГ­a" },
        { palabra: "ALGORITMO",    categoria: "TecnologГ­a" },
        { palabra: "BARCELONA",    categoria: "Ciudades" },
        { palabra: "TOKIO",        categoria: "Ciudades" },
        { palabra: "AMSTERDAM",    categoria: "Ciudades" },
        { palabra: "ESTOCOLMO",    categoria: "Ciudades" },
        { palabra: "CHOCOLATE",    categoria: "Comida" },
        { palabra: "GAZPACHO",     categoria: "Comida" },
        { palabra: "ESPAGUETI",    categoria: "Comida" },
        { palabra: "HAMBURGUESA",  categoria: "Comida" },
        { palabra: "AVENTURA",     categoria: "Cine" },
        { palabra: "COMEDIA",      categoria: "Cine" },
        { palabra: "DOCUMENTAL",   categoria: "Cine" },
        { palabra: "ANIMACION",    categoria: "Cine" },
    ];


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 2. ESTADOS del ahorcado (7 fases: 0 fallos в†’ 6 fallos)
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Cada elemento del array es un string multi-lГ­nea (arte ASCII)
    // que representa el dibujo del ahorcado segГєn los fallos acumulados.

    const DIBUJOS = [
        // 0 fallos вЂ” solo la horca vacГ­a
        `
  +---+
  |   |
      |
      |
      |
      |
=========`,
        // 1 fallo вЂ” aparece la cabeza
        `
  +---+
  |   |
  O   |
      |
      |
      |
=========`,
        // 2 fallos вЂ” aparece el tronco
        `
  +---+
  |   |
  O   |
  |   |
      |
      |
=========`,
        // 3 fallos вЂ” brazo izquierdo
        `
  +---+
  |   |
  O   |
 /|   |
      |
      |
=========`,
        // 4 fallos вЂ” brazo derecho
        `
  +---+
  |   |
  O   |
 /|\\  |
      |
      |
=========`,
        // 5 fallos вЂ” pierna izquierda
        `
  +---+
  |   |
  O   |
 /|\\  |
 /    |
      |
=========`,
        // 6 fallos вЂ” pierna derecha (muerto)
        `
  +---+
  |   |
  O   |
 /|\\  |
 / \\  |
      |
=========`,
    ];


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 3. VARIABLES DE ESTADO de la partida actual
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

    let palabraSecreta   = "";       // La palabra que hay que adivinar
    let letrasAcertadas  = new Set(); // Set: letras que el jugador acertГі
    let letrasUsadas     = new Set(); // Set: TODAS las letras pulsadas (aciertos + fallos)
    let intentosRestantes = 6;        // Empieza con 6 intentos
    let juegoTerminado   = false;     // Flag para bloquear el teclado

    // EstadГ­sticas globales (se acumulan entre partidas)
    let partidas = 0;
    let ganadas  = 0;


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 4. FUNCIГ“N: iniciarJuego()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Se llama al cargar la pГЎgina y al pulsar "Nueva partida".
    // Resetea todo el estado y dibuja la UI inicial.

    function iniciarJuego() {

        // 4a. Elegir una palabra aleatoria del array
        // Math.random()         в†’ nГєmero entre 0 y 1
        // * palabras.length     в†’ escala al tamaГ±o del array
        // Math.floor(...)       в†’ redondea hacia abajo para obtener Г­ndice entero
        const indice = Math.floor(Math.random() * palabras.length);
        const seleccion = palabras[indice];

        palabraSecreta    = seleccion.palabra;
        letrasAcertadas   = new Set();   // VacГ­a el Set de aciertos
        letrasUsadas      = new Set();   // VacГ­a el Set de letras usadas
        intentosRestantes = 6;
        juegoTerminado    = false;

        // 4b. Mostrar categorГ­a
        document.getElementById("textCategoria").textContent = seleccion.categoria;

        // 4c. Ocultar mensaje y botГіn reiniciar
        const elMensaje = document.getElementById("mensaje");
        elMensaje.textContent = "";
        elMensaje.className   = "";      // Quita clases "victoria" o "derrota"
        elMensaje.style.display = "none";
        document.getElementById("btnReiniciar").style.display = "none";

        // 4d. Renderizar las partes visuales
        actualizarDibujo();
        actualizarPalabra();
        crearTeclado();
        actualizarIntentos();
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 5. FUNCIГ“N: crearTeclado()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Genera dinГЎmicamente los 27 botones del abecedario en el div#teclado.

    function crearTeclado() {
        const divTeclado = document.getElementById("teclado");
        divTeclado.innerHTML = ""; // Limpia el teclado anterior

        const abecedario = "ABCDEFGHIJKLMNГ‘OPQRSTUVWXYZ";

        // Recorre cada letra y crea un botГіn
        for (let i = 0; i < abecedario.length; i++) {
            const letra = abecedario[i];

            const btn = document.createElement("button");
            btn.textContent = letra;
            btn.id = "btn-" + letra; // id Гєnico para localizarlo despuГ©s

            // Al hacer clic, llama a procesarLetra con esa letra
            btn.addEventListener("click", function() {
                procesarLetra(letra);
            });

            divTeclado.appendChild(btn);
        }
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 6. FUNCIГ“N: procesarLetra(letra)
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // LГіgica principal: quГ© pasa cuando el jugador pulsa una letra.

    function procesarLetra(letra) {

        // Ignora el clic si el juego ya terminГі o la letra ya fue usada
        if (juegoTerminado) return;
        if (letrasUsadas.has(letra)) return;

        // Registra la letra como usada
        letrasUsadas.add(letra);

        // Deshabilita el botГіn de esa letra
        const btn = document.getElementById("btn-" + letra);
        btn.disabled = true;

        // Comprueba si la letra estГЎ en la palabra secreta
        if (palabraSecreta.includes(letra)) {
            // ACIERTO
            letrasAcertadas.add(letra);
            btn.classList.add("acierto");
            actualizarPalabra();
            comprobarVictoria();       // ВїYa adivinГі todas las letras?

        } else {
            // FALLO
            intentosRestantes--;       // Resta un intento
            btn.classList.add("fallo");
            actualizarDibujo();        // Avanza el dibujo del ahorcado
            actualizarIntentos();
            comprobarDerrota();        // ВїSe acabaron los intentos?
        }
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 7. FUNCIГ“N: actualizarPalabra()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Renderiza la palabra en el div#palabra.
    // Muestra la letra si fue acertada, o "_" si no.

    function actualizarPalabra() {
        const divPalabra = document.getElementById("palabra");
        divPalabra.innerHTML = ""; // Limpia antes de redibujar

        // Recorre cada letra de la palabra secreta
        for (let i = 0; i < palabraSecreta.length; i++) {
            const letra = palabraSecreta[i];
            const span = document.createElement("span");

            // Si la letra estГЎ en el Set de acertadas в†’ muГ©strala
            // Si no в†’ muestra un guiГіn bajo
            span.textContent = letrasAcertadas.has(letra) ? letra : "_";

            divPalabra.appendChild(span);
        }
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 8. FUNCIГ“N: actualizarDibujo()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Elige quГ© fase del ahorcado mostrar segГєn los fallos.
    // Fallos = 6 - intentosRestantes

    function actualizarDibujo() {
        const fallos = 6 - intentosRestantes;
        document.getElementById("dibujo").textContent = DIBUJOS[fallos];
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 9. FUNCIГ“N: actualizarIntentos()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Actualiza el nГєmero de intentos en pantalla.

    function actualizarIntentos() {
        document.getElementById("numIntentos").textContent = intentosRestantes;
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 10. FUNCIГ“N: comprobarVictoria()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Gana si TODAS las letras de la palabra estГЎn en letrasAcertadas.
    // Usamos every() para comprobar que se cumple para cada letra.

    function comprobarVictoria() {
        // every() devuelve true solo si la condiciГіn es verdadera para TODAS las letras
        const gano = [...palabraSecreta].every(letra => letrasAcertadas.has(letra));

        if (gano) {
            juegoTerminado = true;
            partidas++;
            ganadas++;
            actualizarStats();

            const elMensaje = document.getElementById("mensaje");
            elMensaje.textContent = "ВЎEnhorabuena! Adivinaste la palabra рџЋ‰";
            elMensaje.className = "victoria";
            elMensaje.style.display = "block";
            document.getElementById("btnReiniciar").style.display = "inline-block";

            // Deshabilita todo el teclado
            bloquearTeclado();
        }
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 11. FUNCIГ“N: comprobarDerrota()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Pierde si los intentos llegan a 0.

    function comprobarDerrota() {
        if (intentosRestantes <= 0) {
            juegoTerminado = true;
            partidas++;
            actualizarStats();

            // Revela la palabra completa al perder
            const divPalabra = document.getElementById("palabra");
            divPalabra.innerHTML = "";
            for (let i = 0; i < palabraSecreta.length; i++) {
                const span = document.createElement("span");
                span.textContent = palabraSecreta[i];
                span.style.color = "#f87171"; // Rojo para mostrar la soluciГіn
                divPalabra.appendChild(span);
            }

            const elMensaje = document.getElementById("mensaje");
            elMensaje.textContent = `ВЎPerdiste! La palabra era: ${palabraSecreta} рџ’Ђ`;
            elMensaje.className = "derrota";
            elMensaje.style.display = "block";
            document.getElementById("btnReiniciar").style.display = "inline-block";

            bloquearTeclado();
        }
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 12. FUNCIГ“N: bloquearTeclado()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Deshabilita todos los botones del teclado al terminar la partida.

    function bloquearTeclado() {
        const botones = document.querySelectorAll("#teclado button");
        // querySelectorAll devuelve todos los botones dentro de #teclado
        botones.forEach(btn => btn.disabled = true);
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 13. FUNCIГ“N: actualizarStats()
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // Actualiza el panel de estadГ­sticas globales.

    function actualizarStats() {
        document.getElementById("statJugadas").textContent = partidas;
        document.getElementById("statGanadas").textContent = ganadas;
        // Porcentaje con un decimal
        const pct = partidas > 0 ? ((ganadas / partidas) * 100).toFixed(1) : 0;
        document.getElementById("statPct").textContent = pct + "%";
    }


    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    // 14. ARRANQUE: llamar a iniciarJuego() al cargar la pГЎgina
    // в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
    iniciarJuego();

</script>
