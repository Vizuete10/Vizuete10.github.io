<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabla con jQuery</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

<h2>Datos de Personas</h2>

<table border="1">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Edad</th>
        <th>Ciudad</th>
    </tr>
    </thead>

    <tbody>
    <tr>
        <td id="nombre"></td>
        <td id="apellidos"></td>
        <td id="edad"></td>
        <td id="ciudad"></td>
    </tr>
    </tbody>
</table>

<h3>Modificar datos</h3>

<form id="formulario">

    <label>Nombre:</label>
    <input type="text" id="nombreInput"><br><br>

    <label>Apellidos:</label>
    <input type="text" id="apellidosInput"><br><br>

    <label>Edad:</label>
    <input type="number" id="edadInput"><br><br>

    <label>Ciudad:</label>
    <input type="text" id="ciudadInput"><br><br>

    <button type="button" id="btnEnvio">Actualizar tabla</button>

</form>

<script>

    $(document).ready(function(){

        // Datos iniciales
        let obj = {nombre:"Pedro", apellidos:"Poley", edad:"18", ciudad:"Amate"};

        actualizarTabla(obj);

        $("#btnEnvio").click(function(){


            let nuevoObj = {
                nombre: $("#nombreInput").val(),
                apellidos: $("#apellidosInput").val(),
                edad: $("#edadInput").val(),
                ciudad: $("#ciudadInput").val()
            };

            let obj_serializados = enviar(nuevoObj);
            let obj_recuperados = recibir(obj_serializados);

            actualizarTabla(obj_recuperados);

        });

    });

    // función para actualizar tabla
    function actualizarTabla(obj){
        $("#nombre").text(obj.nombre);
        $("#apellidos").text(obj.apellidos);
        $("#edad").text(obj.edad);
        $("#ciudad").text(obj.ciudad);
    }

    // serializar
    function enviar(obj){
        return JSON.stringify(obj);
    }

    // deserializar
    function recibir(json){
        return JSON.parse(json);
    }

</script>

</body>
</html>
